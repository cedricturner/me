<!-- DRAFT: local only, not deployed yet -->
<!--
  Japan 2026 Travel Itinerary
  ============================
  Cedric Turner & Mickey · May 19–30, 2026 · AUS → HND

  Usage:
  - Open index.html in any modern browser (no server needed)
  - All data auto-saves to localStorage key: japan-2026-itinerary
  - Click any activity card to edit it
  - Drag cards to reorder within a day
  - Green FAB (bottom-right) opens the day's Google Maps route
  - Use Import panel to paste text/JSON itinerary data
  - Use Export panel to download JSON/Markdown or enter presentation mode
  - "Reset to default" restores the original seed data (with confirmation)

  To edit seed data: find the SEED_DATA constant near the top of the <script> block
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Japan 2026 · Cedric & Mickey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&family=Permanent+Marker&family=Oswald:wght@400;600&family=Abril+Fatface&family=Bebas+Neue&family=Caveat:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
/* =============================================
   CSS VARIABLES & RESET
   ============================================= */
:root {
  --bg: #fafaf9;
  --card: #ffffff;
  --purple: #9d8fe0;
  --purple-light: #f0effa;
  --purple-dark: #7b6bbf;
  --green: #7ade2c;
  --green-dark: #62c41e;
  --text: #1c1c1c;
  --muted: #888;
  --faint: #bbb;
  --border: #e8e5e0;
  --rule: #e8e5e0;
  --shadow: none;
  --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
  --radius: 8px;
  --radius-sm: 4px;
  --radius-pill: 100px;
  font-size: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  font-size: 15px;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: inherit; }
a { color: inherit; text-decoration: none; }

/* =============================================
   LAYOUT
   ============================================= */
.app {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 0 100px;
  min-height: 100vh;
}

/* =============================================
   HEADER
   ============================================= */
.trip-header {
  background: var(--bg);
  padding: 14px 20px 0;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 0;
}

/* New hero airport block */
.airport-hero {
  flex: 1;
  cursor: pointer;
  user-select: none;
  padding-bottom: 10px;
}

.airport-date-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2px;
}

.airport-date {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.04em;
}

.airport-hero-codes {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  transition: opacity 0.15s;
  position: relative;
}

.airport-hero-code {
  font-size: 52px;
  font-weight: 900;
  letter-spacing: -2px;
  color: var(--text);
  line-height: 1;
  will-change: transform, opacity;
  transition: none;
}

.airport-hero-swap {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  color: var(--purple);
  opacity: 0.5;
  pointer-events: none;
}

.airport-hero-swap svg {
  width: 18px;
  height: 18px;
}

.airport-city-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 1px;
}

.airport-city {
  font-size: 11px;
  color: var(--muted);
  font-weight: 400;
  letter-spacing: 0.02em;
}

.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
  padding-top: 2px;
}

.header-icon-btn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  transition: all 0.15s;
  flex-shrink: 0;
}

.header-icon-btn:hover { background: var(--purple-light); color: var(--purple); }
.header-icon-btn svg { width: 16px; height: 16px; }

/* Day Tabs */
.day-tabs-wrapper {
  margin: 12px -20px 0;
  padding: 0 20px 14px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  display: flex;
  gap: 8px;
}

.day-tabs-wrapper::-webkit-scrollbar { display: none; }

.day-tab {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: var(--radius-pill);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.03em;
  border: 1px solid var(--border);
  color: var(--muted);
  background: transparent;
  white-space: nowrap;
  transition: all 0.15s;
}

.day-tab:hover { border-color: var(--text); color: var(--text); }

.day-tab.active {
  background: var(--text);
  border-color: var(--text);
  color: white;
}

/* =============================================
   COLLAPSIBLE PANELS (Import / Export)
   ============================================= */
.panel {
  margin: 12px 16px 0;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}

.panel-header:hover { background: var(--bg); }

.panel-header-left {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text);
}

.panel-header-left svg { width: 15px; height: 15px; color: var(--purple); }

.panel-chevron {
  color: var(--muted);
  transition: transform 0.2s;
  width: 16px;
  height: 16px;
}

.panel-chevron.open { transform: rotate(180deg); }

.panel-body {
  display: none;
  padding: 0 16px 16px;
  border-top: 1px solid var(--border);
}

.panel-body.open { display: block; }

.panel-body textarea {
  width: 100%;
  min-height: 100px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
  resize: vertical;
  outline: none;
  margin-top: 12px;
  color: var(--text);
  background: var(--bg);
  transition: border-color 0.15s;
}

.panel-body textarea:focus { border-color: var(--purple); }

.panel-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.btn {
  padding: 8px 14px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.btn svg { width: 14px; height: 14px; }

.btn-primary {
  background: var(--purple);
  color: white;
}

.btn-primary:hover { background: var(--purple-dark); }

.btn-secondary {
  background: var(--bg);
  color: var(--text);
  border: 1.5px solid var(--border);
}

.btn-secondary:hover { border-color: var(--purple); color: var(--purple); }

.btn-green {
  background: var(--green);
  color: #1a1a1a;
  font-weight: 600;
}

.btn-green:hover { background: var(--green-dark); }

.btn-danger {
  background: #fff0f0;
  color: #d44;
  border: 1.5px solid #fdd;
}

.btn-danger:hover { background: #fdd; }

.import-preview {
  margin-top: 10px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 12.5px;
  color: var(--muted);
  border: 1px dashed var(--border);
  display: none;
}

.file-input-wrapper {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}

.file-input-wrapper input[type="file"] { display: none; }

/* =============================================
   DAY SECTION
   ============================================= */
.day-section { display: none; padding: 0 16px; }
.day-section.active { display: block; }

.day-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0 10px;
}

.day-section-title {
  font-family: 'Courier Prime', Courier, monospace;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
}

.day-section-subtitle {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--faint);
  margin-top: 3px;
}

.day-route-btn {
  padding: 6px 12px;
  border-radius: var(--radius-pill);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.03em;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.15s;
  flex-shrink: 0;
}

.day-route-btn:hover { border-color: var(--text); color: var(--text); }
.day-route-btn svg { width: 12px; height: 12px; }

/* =============================================
   ACTIVITY CARDS
   ============================================= */
.activities-list { display: flex; flex-direction: column; gap: 10px; }

.activity-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: none;
  overflow: hidden;
  transition: border-color 0.15s, transform 0.15s;
  cursor: pointer;
  position: relative;
}

.activity-card:hover { border-color: #c8c4be; }
.activity-card.dragging { opacity: 0.5; transform: scale(0.98); }
.activity-card.drag-over { border-color: var(--text); }

.card-main {
  display: flex;
  align-items: flex-start;
  padding: 14px 14px 12px;
  gap: 12px;
}

.card-content { flex: 1; min-width: 0; }

.card-stop-time {
  font-size: 11.5px;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 3px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.card-location-name {
  font-family: 'Courier Prime', Courier, monospace;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 3px;
}

.card-neighborhood {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
}

.card-badges {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  align-items: center;
}

/* Base badge */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  line-height: 1.4;
  white-space: nowrap;
  vertical-align: middle;
}

/* All badges — Space Mono, uppercase, consistent */
.badge-food     { background: #fde68a; color: #78350f; }
.badge-anime    { background: #fca5a5; color: #7f1d1d; }
.badge-shopping { background: #99f6e4; color: #134e4a; }
.badge-culture  { background: #bfdbfe; color: #1e3a5f; }
.badge-nightlife{ background: #1e293b; color: #fff; }
.badge-travel   { background: #fed7aa; color: #7c2d12; }
.badge-rest     { background: #e9d5ff; color: #3b0764; }

/* Price badge — clean Space Mono, no background */
.badge-cost {
  font-family: 'Space Mono', monospace;
  background: none;
  color: #888;
  font-size: 11px;
  font-weight: 400;
  padding: 2px 4px;
  transform: none;
  border-radius: 0;
}

.badge-reservation {
  background: #fff8e6;
  color: #b08000;
  font-size: 11px;
  transform: none;
  border-radius: var(--radius-pill);
}

.card-right {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  padding-top: 2px;
}

.heart-btn {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #ccc;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  border-radius: 50%;
  transition: color 0.15s, transform 0.1s;
  flex-shrink: 0;
}

.heart-btn:hover { color: #e85d75; transform: scale(1.15); }
.heart-btn.favorited { color: #e85d75; }
.heart-btn svg { width: 16px; height: 16px; }

.map-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--faint);
  transition: all 0.15s;
}

.map-btn:hover { background: var(--bg); color: var(--text); }
.map-btn svg { width: 15px; height: 15px; }

.drag-handle {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #ccc;
  cursor: grab;
  flex-shrink: 0;
  align-self: center;
}

.drag-handle:active { cursor: grabbing; }
.drag-handle svg { width: 14px; height: 14px; }

/* Card notes (expand/collapse) */
.card-notes-toggle {
  padding: 0 14px 10px;
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--purple);
  font-weight: 500;
  cursor: pointer;
  user-select: none;
}

.card-notes-toggle:hover { color: var(--purple-dark); }
.card-notes-toggle svg { width: 12px; height: 12px; transition: transform 0.2s; }
.card-notes-toggle.open svg { transform: rotate(180deg); }

.card-notes {
  display: none;
  padding: 0 14px 12px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
  border-top: 1px solid var(--border);
  margin: 0 14px;
  padding-top: 10px;
}

.card-notes.open { display: block; }

/* =============================================
   DAY SUMMARY BAR
   ============================================= */
.day-summary {
  margin-top: 14px;
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  gap: 0;
}

.summary-item {
  flex: 1;
  text-align: center;
  border-right: 1px solid var(--border);
}

.summary-item:last-child { border-right: none; }

.summary-value {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
}

.summary-label {
  font-size: 11px;
  color: var(--muted);
  margin-top: 1px;
}

/* =============================================
   ADD ACTIVITY / ADD DAY
   ============================================= */
.add-activity-btn {
  margin-top: 12px;
  width: 100%;
  padding: 13px;
  border: 1.5px dashed var(--border);
  border-radius: var(--radius);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--purple);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.15s;
  background: transparent;
}

.add-activity-btn:hover {
  background: var(--purple-light);
  border-color: var(--purple);
}

.add-activity-btn svg { width: 16px; height: 16px; }

.add-day-section {
  padding: 12px 16px;
}

.add-day-btn {
  width: 100%;
  padding: 13px;
  border: 1.5px dashed var(--border);
  border-radius: var(--radius);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.15s;
  background: transparent;
}

.add-day-btn:hover { background: var(--bg); border-color: var(--muted); color: var(--text); }

/* =============================================
   GREEN FAB
   ============================================= */
.fab {
  position: fixed;
  bottom: 24px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--green);
  color: #1a1a1a;
  box-shadow: 0 4px 18px rgba(122,222,44,0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  transition: all 0.2s;
}

.fab:hover {
  transform: scale(1.08);
  background: var(--green-dark);
  box-shadow: 0 6px 24px rgba(122,222,44,0.55);
}

.fab:active { transform: scale(0.95); }
.fab svg { width: 24px; height: 24px; }

/* =============================================
   MODAL
   ============================================= */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 300;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--card);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  padding: 0 20px 32px;
}

.modal-overlay.open .modal { transform: translateY(0); }

.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 16px;
}

.modal-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  margin-bottom: 18px;
}

.form-group {
  margin-bottom: 14px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color 0.15s;
}

.form-input:focus { border-color: var(--purple); }

.form-textarea {
  min-height: 80px;
  resize: vertical;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.form-select {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  outline: none;
  appearance: none;
  cursor: pointer;
}

.checkbox-group {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.checkbox-label {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  cursor: pointer;
}

.checkbox-label input { cursor: pointer; accent-color: var(--purple); }

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.modal-actions .btn { flex: 1; justify-content: center; padding: 12px; font-size: 14px; }

/* Category checkbox grid */
.category-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.category-check {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}

.category-check input { display: none; }
.category-check.checked { border-color: var(--purple); background: var(--purple-light); color: var(--purple-dark); }

/* =============================================
   PRINT / PRESENTATION MODE
   ============================================= */
.presentation-mode .header-actions,
.presentation-mode .day-route-btn,
.presentation-mode .add-activity-btn,
.presentation-mode .add-day-section,
.presentation-mode .panel,
.presentation-mode .card-main .drag-handle,
.presentation-mode .fab { display: none !important; }

.presentation-mode .activity-card { cursor: default; }

@media print {
  .header-actions, .day-route-btn, .add-activity-btn,
  .add-day-section, .panel, .drag-handle, .fab,
  .day-tabs-wrapper { display: none !important; }
  .day-section { display: block !important; page-break-after: always; }
  body { background: white; }
  .activity-card { box-shadow: none; border: 1px solid #eee; }
  .trip-header { position: static; box-shadow: none; }
}

/* =============================================
   MISC UTILITY
   ============================================= */
.text-purple { color: var(--purple); }
.mt-8 { margin-top: 8px; }
.flex { display: flex; }
.gap-8 { gap: 8px; }
.items-center { align-items: center; }

.toast {
  position: fixed;
  bottom: 96px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: white;
  padding: 10px 18px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s;
  z-index: 400;
  pointer-events: none;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* =============================================
   TRIP CONFIG MODAL
   ============================================= */
.config-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);

// =============================================
// INIT
// =============================================
function init() {
  const saved = localStorage.getItem('japan-2026-itinerary');
  if (saved) {
    try { itinerary = JSON.parse(saved); }
    catch(e) { itinerary = deepClone(SEED_DATA); }
  } else {
    itinerary = deepClone(SEED_DATA);
  }
  render();
}

function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

function save() {
  localStorage.setItem('japan-2026-itinerary', JSON.stringify(itinerary));
}

// =============================================
// RENDER
// =============================================
function render() {
  renderDayTabs();
  renderDaySections();
  if (activeDayIndex >= itinerary.days.length) activeDayIndex = 0;
  setActiveDay(activeDayIndex, false);
}

function renderDayTabs() {
  const container = document.getElementById('dayTabs');
  container.innerHTML = '';
  itinerary.days.forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === activeDayIndex ? ' active' : '');
    btn.textContent = day.label + ' · ' + formatDate(day.date);
    btn.onclick = () => setActiveDay(i);
    container.appendChild(btn);
  });
}

function renderDaySections() {
  const container = document.getElementById('daySections');
  container.innerHTML = '';
  itinerary.days.forEach((day, i) => {
    container.appendChild(buildDaySection(day, i));
  });
}

function buildDaySection(day, dayIndex) {
  const section = document.createElement('div');
  section.className = 'day-section' + (dayIndex === activeDayIndex ? ' active' : '');
  section.id = 'day-' + day.id;

  // Summary counts
  const mustCount = day.activities.filter(a => a.favorited).length;
  const resCount = day.activities.filter(a => a.reservation && !a.reservationDone).length;
  const totalCost = calcDayCost(day);

  section.innerHTML = `
    <div class="day-section-header">
      <div>
        <div class="day-section-title">${escHtml(day.title)}</div>
        <div class="day-section-subtitle">${day.label} · ${formatDateLong(day.date)}</div>
      </div>
      <button class="day-route-btn" onclick="openDayRoute(${dayIndex})">

        Route

    </div>
    <div class="activities-list" id="list-${day.id}" data-day-id="${day.id}"></div>
    <div class="day-summary">
      <div class="summary-item">
        <div class="summary-value">${totalCost > 0 ? '¥' + totalCost.toLocaleString() : '—'}</div>
        <div class="summary-label">Est. Cost</div>
      </div>
      <div class="summary-item">
        <div class="summary-value">♥ ${mustCount}</div>
        <div class="summary-label">Favorites</div>
      </div>
      <div class="summary-item">

        <div class="summary-label">Reservations</div>
      </div>
    </div>
    <button class="add-activity-btn" onclick="openNewActivity('${day.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Activity

  const list = section.querySelector('#list-' + day.id);
  day.activities.forEach((act, actIndex) => {
    list.appendChild(buildActivityCard(act, actIndex, day));

  setupDragDrop(list, day.id);

}

      </div>
      <div class="card-content">

        <div class="card-badges">${badgesHtml}</div>
      </div>
      <div class="card-right">
        <button class="heart-btn${isFav ? ' favorited' : ''}" onclick="toggleFavorite(event,'${day.id}','${act.id}')" title="${isFav ? 'Remove from favorites' : 'Add to favorites'}">
          ${isFav
            ? `<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
            : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
          }
        </button>
        <button class="map-btn" onclick="openMaps(event, '${encodeURIComponent(act.address || act.name)}')" title="Open in Google Maps">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>

        Notes

}

// =============================================
// DAY SWITCHING
// =============================================
function setActiveDay(index, doScroll = true) {
  activeDayIndex = index;

  // Update tabs
  document.querySelectorAll('.day-tab').forEach((t, i) => {
    t.classList.toggle('active', i === index);
  });

  // Update sections
  document.querySelectorAll('.day-section').forEach((s, i) => {
    s.classList.toggle('active', i === index);
  });

  if (doScroll) {
    const activeTab = document.querySelectorAll('.day-tab')[index];
    if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// =============================================
// DRAG & DROP REORDER
// =============================================
function setupDragDrop(listEl, dayId) {
  let dragSrc = null;

  listEl.querySelectorAll('.activity-card').forEach(card => {
    card.addEventListener('dragstart', (e) => {
      dragSrc = card;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });

    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      listEl.querySelectorAll('.activity-card').forEach(c => c.classList.remove('drag-over'));
      saveReorder(listEl, dayId);
    });

    card.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      listEl.querySelectorAll('.activity-card').forEach(c => c.classList.remove('drag-over'));
      if (card !== dragSrc) card.classList.add('drag-over');
    });

    card.addEventListener('drop', (e) => {
      e.preventDefault();
      if (dragSrc && dragSrc !== card) {
        const cards = [...listEl.querySelectorAll('.activity-card')];
        const srcIdx = cards.indexOf(dragSrc);
        const dstIdx = cards.indexOf(card);
        if (srcIdx < dstIdx) {
          listEl.insertBefore(dragSrc, card.nextSibling);
        } else {
          listEl.insertBefore(dragSrc, card);
        }
      }
    });
  });
}

function saveReorder(listEl, dayId) {
  const day = itinerary.days.find(d => d.id === dayId);
  if (!day) return;
  const newOrder = [...listEl.querySelectorAll('.activity-card')].map(c => c.dataset.activityId);
  day.activities.sort((a, b) => newOrder.indexOf(a.id) - newOrder.indexOf(b.id));
  save();
  // Re-render stop numbers without full re-render
  rerenderActivityList(dayId);
}

function rerenderActivityList(dayId) {
  const day = itinerary.days.find(d => d.id === dayId);
  if (!day) return;
  const list = document.getElementById('list-' + dayId);
  if (!list) return;
  list.innerHTML = '';
  day.activities.forEach((act, i) => list.appendChild(buildActivityCard(act, i, day)));
  setupDragDrop(list, dayId);
}

// =============================================
// MAPS
// =============================================
function openMaps(e, encodedQuery) {
  e.stopPropagation();
  window.open(`https://www.google.com/maps/search/?api=1&query=${encodedQuery}`, '_blank');
}

function openDayRoute(dayIndex) {
  const idx = dayIndex !== undefined ? dayIndex : activeDayIndex;
  const day = itinerary.days[idx];
  if (!day) return;
  const stops = day.activities
    .map(a => a.address || a.name)
    .filter(Boolean)
    .slice(0, 8);
  if (stops.length === 0) { showToast('No stops to navigate'); return; }
  const url = 'https://www.google.com/maps/dir/' + stops.map(s => encodeURIComponent(s)).join('/');
  window.open(url, '_blank');
}

// =============================================
// NOTES TOGGLE
// =============================================
function toggleNotes(e, toggleEl) {
  e.stopPropagation();
  const card = toggleEl.closest('.activity-card');
  const notesEl = card.querySelector('.card-notes');
  const isOpen = notesEl.classList.toggle('open');
  toggleEl.classList.toggle('open', isOpen);
}

// MODAL — EDIT ACTIVITY
// =============================================
function buildCategoryGrid(selectedCats) {
  const grid = document.getElementById('categoryGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const label = document.createElement('label');
    label.className = 'category-check' + (selectedCats.includes(cat.key) ? ' checked' : '');
    label.innerHTML = `<input type="checkbox" value="${cat.key}" ${selectedCats.includes(cat.key) ? 'checked' : ''}>${cat.label}`;
    label.querySelector('input').addEventListener('change', function() {
      label.classList.toggle('checked', this.checked);
    });
    grid.appendChild(label);
  });
}

function openEditActivity(dayId, actId) {
  const day = itinerary.days.find(d => d.id === dayId);
  if (!day) return;
  const act = day.activities.find(a => a.id === actId);
  if (!act) return;

  editingDayId = dayId;
  editingActivityId = actId;
  isNewActivity = false;

  document.getElementById('modalTitle').textContent = 'Edit Activity';
  document.getElementById('deleteBtn').style.display = '';
  document.getElementById('fieldName').value = act.name || '';
  document.getElementById('fieldTime').value = act.time || '';
  document.getElementById('fieldCost').value = act.cost || '';
  document.getElementById('fieldNeighborhood').value = act.neighborhood || '';
  document.getElementById('fieldAddress').value = act.address || '';
  document.getElementById('fieldPriority').value = act.priority || 'optional';
  document.getElementById('fieldReservationNeeded').checked = act.reservation || false;
  document.getElementById('fieldReservationDone').checked = act.reservationDone || false;
  document.getElementById('fieldNotes').value = act.notes || '';
  buildCategoryGrid(act.categories || []);

  openModal();
}

function openNewActivity(dayId) {
  editingDayId = dayId;
  editingActivityId = null;
  isNewActivity = true;

  document.getElementById('modalTitle').textContent = 'Add Activity';
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('fieldName').value = '';
  document.getElementById('fieldTime').value = '';
  document.getElementById('fieldCost').value = '';
  document.getElementById('fieldNeighborhood').value = '';
  document.getElementById('fieldAddress').value = '';
  document.getElementById('fieldPriority').value = 'optional';
  document.getElementById('fieldReservationNeeded').checked = false;
  document.getElementById('fieldReservationDone').checked = false;
  document.getElementById('fieldNotes').value = '';
  buildCategoryGrid([]);

  openModal();
}

function saveActivity() {
  const name = document.getElementById('fieldName').value.trim();
  if (!name) { document.getElementById('fieldName').focus(); return; }

  const cats = [...document.querySelectorAll('#categoryGrid input:checked')].map(i => i.value);

  const data = {
    name,
    time: document.getElementById('fieldTime').value,
    cost: document.getElementById('fieldCost').value.trim(),
    neighborhood: document.getElementById('fieldNeighborhood').value.trim(),
    address: document.getElementById('fieldAddress').value.trim(),
    categories: cats,
    priority: document.getElementById('fieldPriority').value,
    reservation: document.getElementById('fieldReservationNeeded').checked,
    reservationDone: document.getElementById('fieldReservationDone').checked,
    notes: document.getElementById('fieldNotes').value.trim()
  };

  const day = itinerary.days.find(d => d.id === editingDayId);
  if (!day) return;

  if (isNewActivity) {
    data.id = 'a' + Date.now();
    day.activities.push(data);
  } else {
    const idx = day.activities.findIndex(a => a.id === editingActivityId);
    if (idx >= 0) day.activities[idx] = { ...day.activities[idx], ...data };
  }

  save();
  closeModal();
  rerenderActivityList(editingDayId);
  updateDaySummary(editingDayId);
  showToast(isNewActivity ? 'Activity added' : 'Changes saved');
}

function deleteActivity() {
  if (!confirm('Delete this activity?')) return;
  const day = itinerary.days.find(d => d.id === editingDayId);
  if (!day) return;
  day.activities = day.activities.filter(a => a.id !== editingActivityId);
  save();
  closeModal();
  rerenderActivityList(editingDayId);
  updateDaySummary(editingDayId);
  showToast('Activity deleted');
}

function updateDaySummary(dayId) {
  const day = itinerary.days.find(d => d.id === dayId);
  if (!day) return;
  const section = document.getElementById('day-' + dayId);
  if (!section) return;
  const items = section.querySelectorAll('.summary-item .summary-value');
  const totalCost = calcDayCost(day);
  const mustCount = day.activities.filter(a => a.priority === 'must').length;
  const resCount = day.activities.filter(a => a.reservation && !a.reservationDone).length;
  if (items[0]) items[0].textContent = totalCost > 0 ? '¥' + totalCost.toLocaleString() : '—';
  if (items[1]) items[1].textContent = '⭐ ' + mustCount;
  if (items[2]) items[2].textContent = resCount > 0 ? '📅 ' + resCount : '—';
}

function addDay() {
  const lastDay = itinerary.days[itinerary.days.length - 1];
  const lastDate = lastDay ? new Date(lastDay.date + 'T00:00:00') : new Date();
  lastDate.setDate(lastDate.getDate() + 1);

  const newDayNum = itinerary.days.length + 1;

  const newDay = {
    id: 'd' + Date.now(),
    label: 'Day ' + newDayNum,
    date: dateStr,
    title: 'New Day',
    activities: []
  };

  itinerary.days.push(newDay);
  save();
  render();

}

// =============================================
// IMPORT
// =============================================
function parseImport() {
  const raw = document.getElementById('importText').value.trim();
  if (!raw) return;

  let parsed = null;

  // Try JSON
  if (raw.startsWith('{') || raw.startsWith('[')) {
    try {
      const obj = JSON.parse(raw);
      if (obj.days && Array.isArray(obj.days)) {
        parsed = obj;
      }
    } catch(e) {}
  }

  // Try markdown / text
  if (!parsed) {
    parsed = parseTextItinerary(raw);
  }

  const preview = document.getElementById('importPreview');
  const importBtn = document.getElementById('importBtn');

  if (parsed && parsed.days && parsed.days.length > 0) {
    parsedImportData = parsed;
    let html = `<strong>Found ${parsed.days.length} day(s):</strong><br>`;
    parsed.days.forEach(d => {
      html += `• ${d.label || d.title}: ${d.activities.length} activit${d.activities.length !== 1 ? 'ies' : 'y'}<br>`;
    });
    preview.innerHTML = html;
    preview.style.display = 'block';
    importBtn.disabled = false;
  } else {
    preview.innerHTML = '<span style="color:#d44">Could not parse. Importing as notes on Day 1.</span>';
    preview.style.display = 'block';
    parsedImportData = {
      days: [{
        id: 'd' + Date.now(),
        label: 'Day (Imported)',
        date: itinerary.startDate,
        title: 'Imported Notes',
        activities: [{
          id: 'a' + Date.now(),
          name: 'Imported Content',
          time: '',
          neighborhood: '',
          address: '',
          categories: [],
          priority: 'optional',
          cost: '',
          reservation: false,
          reservationDone: false,
          notes: raw.slice(0, 500)
        }]
      }]
    };
    importBtn.disabled = false;
  }
}

function parseTextItinerary(text) {
  const lines = text.split('\n');
  const days = [];
  let currentDay = null;

  lines.forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) return;

    // Day heading patterns: "Day 1:", "## Day 2", "Day 1 · May 19"
    const dayMatch = trimmed.match(/^(?:##?\s*)?Day\s*(\d+)[:\s·]*(.*)$/i);
    if (dayMatch) {
      currentDay = {
        id: 'd' + Date.now() + days.length,
        label: 'Day ' + dayMatch[1],
        date: '',
        title: dayMatch[2].split(':').pop().trim() || 'Day ' + dayMatch[1],
        activities: []
      };
      days.push(currentDay);
      return;
    }

    if (!currentDay) {
      currentDay = { id: 'd' + Date.now(), label: 'Day 1', date: '', title: 'Imported', activities: [] };
      days.push(currentDay);
    }

    // Activity: "- Name (category) [time] [cost]"
    const actMatch = trimmed.match(/^[-*•]\s*(.+)/);
    if (actMatch) {
      const content = actMatch[1];
      const timeMatch = content.match(/(\d{1,2}:\d{2}\s*(?:AM|PM)?)/i);
      const costMatch = content.match(/(¥[\d,]+|\$[\d,.]+|USD?\s*[\d,.]+)/i);
      const name = content.replace(/\s*\(.*?\)\s*/g,'').replace(/(¥[\d,]+|\$[\d,.]+)/g,'').replace(/\d{1,2}:\d{2}\s*(?:AM|PM)?/gi,'').trim().replace(/[:—-]+$/, '').trim();
      currentDay.activities.push({
        id: 'a' + Date.now() + Math.random(),
        name: name || content.slice(0, 60),
        time: timeMatch ? timeMatch[1] : '',
        neighborhood: '',
        address: name || content.slice(0, 60),
        categories: inferCategories(content),
        priority: content.toLowerCase().includes('must') ? 'must' : content.toLowerCase().includes('nice') ? 'nice' : 'optional',
        cost: costMatch ? costMatch[1] : '',
        reservation: content.toLowerCase().includes('reserv'),
        reservationDone: false,
        notes: ''
      });
    }
  });

  return days.length > 0 ? { days } : null;
}

function inferCategories(text) {
  const t = text.toLowerCase();
  const cats = [];
  if (t.includes('anime') || t.includes('manga') || t.includes('ghibli') || t.includes('pokémon') || t.includes('pokemon') || t.includes('gundam') || t.includes('kirby')) cats.push('anime');
  if (t.includes('food') || t.includes('eat') || t.includes('dinner') || t.includes('lunch') || t.includes('breakfast') || t.includes('café') || t.includes('cafe') || t.includes('ramen') || t.includes('sushi')) cats.push('food');
  if (t.includes('shop') || t.includes('buy') || t.includes('store') || t.includes('mall')) cats.push('shopping');
  if (t.includes('temple') || t.includes('museum') || t.includes('culture') || t.includes('art') || t.includes('walk') || t.includes('park')) cats.push('culture');
  if (t.includes('bar') || t.includes('club') || t.includes('night') || t.includes('gai')) cats.push('nightlife');
  if (t.includes('train') || t.includes('fly') || t.includes('flight') || t.includes('shinkansen') || t.includes('airport') || t.includes('depart')) cats.push('travel');
  if (t.includes('hotel') || t.includes('check in') || t.includes('rest') || t.includes('sleep') || t.includes('pack')) cats.push('rest');
  return cats.length > 0 ? cats : ['culture'];
}

function doImport() {
  if (!parsedImportData) return;
  if (!confirm(`Import ${parsedImportData.days.length} day(s)? This will ADD to your current itinerary.`)) return;
  parsedImportData.days.forEach(d => itinerary.days.push(d));
  save();
  render();
  document.getElementById('importText').value = '';
  document.getElementById('importPreview').style.display = 'none';
  document.getElementById('importBtn').disabled = true;
  parsedImportData = null;
  showToast('Imported successfully');
}

function loadJsonFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('importText').value = e.target.result;
    document.getElementById('fileStatus').textContent = file.name;
    parseImport();
  };
  reader.readAsText(file);
}

// =============================================
// EXPORT
// =============================================
function copyAsText() {
  let txt = itinerary.tripName + '\n';
  txt += itinerary.travelers + ' · ' + formatDateLong(itinerary.startDate) + ' – ' + formatDateLong(itinerary.endDate) + '\n\n';
  itinerary.days.forEach(day => {
    txt += day.label + ' · ' + formatDateLong(day.date);
    if (day.title) txt += ' — ' + day.title;
    txt += '\n';
    day.activities.forEach(act => {
      const time = act.time ? formatTime(act.time) + '  ' : '';
      const star = act.priority === 'must' ? ' ★' : '';
      txt += '  - ' + time + act.name + star;
      if (act.neighborhood) txt += ' (' + act.neighborhood + ')';
      if (act.reservation && !act.reservationDone) txt += ' [reserve]';
      txt += '\n';
    });
    txt += '\n';
  });
  navigator.clipboard.writeText(txt)
    .then(() => showToast('Copied to clipboard!'))
    .catch(() => showToast('Copy failed — try Print instead'));
}

function downloadFile(filename, content, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function toggleFavorite(event, dayId, actId) {
  event.stopPropagation();
  const day = itinerary.days.find(d => d.id === dayId);
  if (!day) return;
  const act = day.activities.find(a => a.id === actId);
  if (!act) return;
  act.favorited = !act.favorited;
  save();

  const card = document.querySelector(`[data-activity-id="${actId}"]`);
  if (!card) return;
  const btn = card.querySelector('.heart-btn');
  if (!btn) return;

  const heartFilled = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  const heartEmpty = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;

  btn.innerHTML = act.favorited ? heartFilled : heartEmpty;
  btn.classList.toggle('favorited', act.favorited);
  btn.title = act.favorited ? 'Remove from favorites' : 'Add to favorites';

  // Update the day summary heart count without full re-render
  const section = document.getElementById('day-' + dayId);
  if (section) {
    const favCount = day.activities.filter(a => a.favorited).length;
    const sumVal = section.querySelector('.summary-item:nth-child(2) .summary-value');
    if (sumVal) sumVal.textContent = '♥ ' + favCount;
  }
}

// =============================================
// HELPERS
// =============================================
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatDateLong(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
}

function formatTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hh = h % 12 || 12;
  return `${hh}:${String(m).padStart(2,'0')} ${ampm}`;
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function calcDayCost(day) {
  let total = 0;
  day.activities.forEach(a => {
    if (!a.cost) return;
    const match = a.cost.replace(/,/g,'').match(/[\d]+/);
    if (match) total += parseInt(match[0]);
  });
  return total;
}

// =============================================
// TRIP CONFIG (header airport/date editing)
// =============================================
const TRIP_CONFIG_DEFAULTS = {
  fromCode: 'AUS',
  fromCity: 'Austin',
  toCode: 'HND',
  toCity: 'Tokyo',
  depDate: '2026-05-19',
  retDate: '2026-05-30'
};

let tripConfig = TRIP_CONFIG_DEFAULTS;

function loadTripConfig() {
  const saved = localStorage.getItem('japan-trip-config');
  if (saved) {
    try { tripConfig = { ...TRIP_CONFIG_DEFAULTS, ...JSON.parse(saved) }; }
    catch(e) { tripConfig = { ...TRIP_CONFIG_DEFAULTS }; }
  } else {
    tripConfig = { ...TRIP_CONFIG_DEFAULTS };
  }
  applyTripConfig();
}

function saveTripConfigToStorage() {
  localStorage.setItem('japan-trip-config', JSON.stringify(tripConfig));
}

function applyTripConfig() {
  document.getElementById('headerFrom').textContent = (tripConfig.fromCode || '???').toUpperCase();
  document.getElementById('headerTo').textContent = (tripConfig.toCode || '???').toUpperCase();
  document.getElementById('headerFromCity').textContent = tripConfig.fromCity || '';
  document.getElementById('headerToCity').textContent = tripConfig.toCity || '';

  // Format dates as MM/DD
  function fmtShort(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    if (isNaN(d)) return dateStr;
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return mm + '/' + dd;
  }
  document.getElementById('headerDepDate').textContent = fmtShort(tripConfig.depDate);
  document.getElementById('headerArrDate').textContent = fmtShort(tripConfig.retDate);
}

function openTripConfig() {
  document.getElementById('cfgFromCode').value = tripConfig.fromCode;
  document.getElementById('cfgToCode').value = tripConfig.toCode;
  document.getElementById('cfgFromCity').value = tripConfig.fromCity;
  document.getElementById('cfgToCity').value = tripConfig.toCity;
  document.getElementById('cfgDepDate').value = tripConfig.depDate;
  document.getElementById('cfgRetDate').value = tripConfig.retDate;
  document.getElementById('configModalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeTripConfig() {
  document.getElementById('configModalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeConfigModalOnBackdrop(e) {
  if (e.target === document.getElementById('configModalOverlay')) closeTripConfig();
}

function saveTripConfig() {
  tripConfig = {
    fromCode: (document.getElementById('cfgFromCode').value.trim() || 'AUS').toUpperCase(),
    fromCity: document.getElementById('cfgFromCity').value.trim() || 'Austin',
    toCode: (document.getElementById('cfgToCode').value.trim() || 'HND').toUpperCase(),
    toCity: document.getElementById('cfgToCity').value.trim() || 'Tokyo',
    depDate: document.getElementById('cfgDepDate').value || '2026-05-19',
    retDate: document.getElementById('cfgRetDate').value || '2026-05-30'
  };
  saveTripConfigToStorage();
  applyTripConfig();
  closeTripConfig();
  showToast('Trip updated');
}

// =============================================
// SCROLL SPREAD ANIMATION
// =============================================
(function () {
  const SCROLL_MAX  = 80;   // px scroll to reach full effect
  const SPREAD_PX   = 120;  // max translateX each side — pushes to screen edges
  const SCALE_END   = 0.72; // shrink to 72% at full scroll
  const OPACITY_MIN = 0.18; // very faint at full scroll

  function onScroll() {
    const progress = Math.min(window.scrollY, SCROLL_MAX) / SCROLL_MAX;
    const spread   = progress * SPREAD_PX;
    const scale    = 1 - progress * (1 - SCALE_END);
    const opacity  = 1 - progress * (1 - OPACITY_MIN);

    const from = document.getElementById('headerFrom');
    const to   = document.getElementById('headerTo');
    const swap = document.querySelector('.airport-hero-swap');
    const cityRow = document.querySelector('.airport-city-row');
    if (!from || !to) return;

    from.style.transform       = `translateX(-${spread}px) scale(${scale})`;
    from.style.transformOrigin = 'left center';
    from.style.opacity         = opacity;

    to.style.transform       = `translateX(${spread}px) scale(${scale})`;
    to.style.transformOrigin = 'right center';
    to.style.opacity         = opacity;

    if (swap)    swap.style.opacity    = (1 - progress).toString();
    if (cityRow) cityRow.style.opacity = (1 - progress * 1.5).toString();
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
}());
