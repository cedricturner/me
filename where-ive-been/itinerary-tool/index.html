<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Itinerary Tool — Cedric Turner II</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&family=Permanent+Marker&family=Oswald:wght@400;600&family=Abril+Fatface&family=Bebas+Neue&family=Caveat:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
/* =============================================
   CSS VARIABLES & RESET
   ============================================= */
:root {
  --bg: #fafaf9;
  --card: #ffffff;
  --purple: #9d8fe0;
  --purple-light: #f0effa;
  --purple-dark: #7b6bbf;
  --green: #7ade2c;
  --green-dark: #62c41e;
  --text: #1c1c1c;
  --muted: #888;
  --faint: #bbb;
  --border: #e8e5e0;
  --rule: #e8e5e0;
  --shadow: none;
  --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
  --radius: 8px;
  --radius-sm: 4px;
  --radius-pill: 100px;
  font-size: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  font-size: 15px;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: inherit; }
a { color: inherit; text-decoration: none; }

/* =============================================
   LAYOUT
   ============================================= */
.app {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 0 100px;
  min-height: 100vh;
}

/* =============================================
   HEADER
   ============================================= */
.trip-header {
  background: var(--bg);
  padding: 14px 20px 0;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 0;
}

/* New hero airport block */
.airport-hero {
  flex: 1;
  cursor: pointer;
  user-select: none;
  padding-bottom: 10px;
}

.trip-name-display {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.trip-name-pencil {
  width: 10px;
  height: 10px;
  opacity: 0.5;
  flex-shrink: 0;
}

.airport-date-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2px;
}

.airport-date {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.04em;
}

.airport-hero-codes {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  transition: opacity 0.15s;
  position: relative;
}

.airport-hero-code {
  font-size: 52px;
  font-weight: 900;
  letter-spacing: -2px;
  color: var(--text);
  line-height: 1;
  will-change: transform, opacity;
  transition: none;
  border-bottom: 2px dashed var(--muted);
  padding-bottom: 2px;
}
.airport-hero:hover .airport-hero-code {
  border-bottom-color: var(--purple);
  color: var(--purple);
}

.airport-hero-swap {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  color: var(--purple);
  opacity: 0.5;
  pointer-events: none;
}

.airport-hero-swap svg {
  width: 18px;
  height: 18px;
}

.airport-city-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 1px;
}

.airport-city {
  font-size: 11px;
  color: var(--muted);
  font-weight: 400;
  letter-spacing: 0.02em;
}

.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
  padding-top: 2px;
}

.header-icon-btn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  transition: all 0.15s;
  flex-shrink: 0;
}

.header-icon-btn:hover { background: var(--purple-light); color: var(--purple); }
.header-icon-btn svg { width: 16px; height: 16px; }

/* Day Tabs */
.day-tabs-wrapper {
  margin: 12px -20px 0;
  padding: 0 20px 14px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  display: flex;
  gap: 8px;
}

.day-tabs-wrapper::-webkit-scrollbar { display: none; }

.day-tab {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: var(--radius-pill);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.03em;
  border: 1px solid var(--border);
  color: var(--muted);
  background: transparent;
  white-space: nowrap;
  transition: all 0.15s;
}

.day-tab:hover { border-color: var(--text); color: var(--text); }

.day-tab.active {
  background: var(--text);
  border-color: var(--text);
  color: white;
}

/* =============================================
   COLLAPSIBLE PANELS (Import / Export)
   ============================================= */
.panel {
  margin: 12px 16px 0;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}

.panel-header:hover { background: var(--bg); }

.panel-header-left {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text);
}

.panel-header-left svg { width: 15px; height: 15px; color: var(--purple); }

.panel-chevron {
  color: var(--muted);
  transition: transform 0.2s;
  width: 16px;
  height: 16px;
}

.panel-chevron.open { transform: rotate(180deg); }

.panel-body {
  display: none;
  padding: 0 16px 16px;
  border-top: 1px solid var(--border);
}

.panel-body.open { display: block; }

.panel-body textarea {
  width: 100%;
  min-height: 100px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
  resize: vertical;
  outline: none;
  margin-top: 12px;
  color: var(--text);
  background: var(--bg);
  transition: border-color 0.15s;
}

.panel-body textarea:focus { border-color: var(--purple); }

.panel-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.btn {
  padding: 8px 14px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.btn svg { width: 14px; height: 14px; }

.btn-primary {
  background: var(--purple);
  color: white;
}

.btn-primary:hover { background: var(--purple-dark); }

.btn-secondary {
  background: var(--bg);
  color: var(--text);
  border: 1.5px solid var(--border);
}

.btn-secondary:hover { border-color: var(--purple); color: var(--purple); }

.btn-green {
  background: var(--green);
  color: #1a1a1a;
  font-weight: 600;
}

.btn-green:hover { background: var(--green-dark); }

.btn-danger {
  background: #fff0f0;
  color: #d44;
  border: 1.5px solid #fdd;
}

/* ── Saved Trips list ── */
.saved-trips-empty {
  padding: 20px 0 8px;
  font-size: 13px;
  color: var(--muted);
  text-align: center;
}
.saved-trip-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-top: 1px solid var(--border);
}
.saved-trip-item:last-of-type { border-bottom: 1px solid var(--border); }
.saved-trip-info {
  flex: 1;
  min-width: 0;
  cursor: pointer;
}
.saved-trip-info:hover .saved-trip-name { color: var(--purple); }
.saved-trip-name {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.15s;
}
.saved-trip-route {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.03em;
  margin-top: 2px;
}
.saved-trip-date {
  font-size: 10px;
  color: var(--faint);
  margin-top: 1px;
}
.saved-trip-del {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: none;
  border: none;
  color: var(--faint);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s;
}
.saved-trip-del:hover { background: #fff0f0; color: #d44; }
.saved-trip-del svg { width: 13px; height: 13px; }

.share-wrap {
  position: relative;
  display: inline-flex;
}
.share-menu {
  display: none;
  position: absolute;
  bottom: calc(100% + 8px);
  left: 0;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  min-width: 180px;
  z-index: 200;
  overflow: hidden;
}
.share-menu.open { display: block; }
.share-menu button {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 11px 14px;
  background: none;
  border: none;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  text-align: left;
}
.share-menu button:hover { background: var(--bg); }
.share-menu button svg { width: 15px; height: 15px; flex-shrink: 0; color: var(--muted); }

.btn-danger:hover { background: #fdd; }

.import-preview {
  margin-top: 10px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 12.5px;
  color: var(--muted);
  border: 1px dashed var(--border);
  display: none;
}

.file-input-wrapper {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}

.file-input-wrapper input[type="file"] { display: none; }

.import-file-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 11px 16px;
  background: var(--purple);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 14px;
  letter-spacing: 0.01em;
}
.import-file-btn:hover { background: var(--purple-dark, #5b21b6); }
.import-file-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
.import-file-btn input[type="file"] { display: none; }

.import-or {
  font-size: 11px;
  color: var(--faint);
  text-align: center;
  margin-bottom: 10px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* =============================================
   DAY SECTION
   ============================================= */
.day-section { display: none; padding: 0 16px; }
.day-section.active { display: block; }

.day-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0 10px;
}

.day-section-title {
  font-family: 'Courier Prime', Courier, monospace;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
}

.day-section-subtitle {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--faint);
  margin-top: 3px;
}

.day-route-btn {
  padding: 6px 12px;
  border-radius: var(--radius-pill);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.03em;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.15s;
  flex-shrink: 0;
}

.day-route-btn:hover { border-color: var(--text); color: var(--text); }
.day-route-btn svg { width: 12px; height: 12px; }

/* =============================================
   ACTIVITY CARDS
   ============================================= */
.activities-list { display: flex; flex-direction: column; gap: 10px; }

.activity-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: none;
  overflow: hidden;
  transition: border-color 0.15s, transform 0.15s;
  cursor: pointer;
  position: relative;
}

.activity-card:hover { border-color: #c8c4be; }
.activity-card.dragging { opacity: 0.5; transform: scale(0.98); }
.activity-card.drag-over { border-color: var(--text); }

.card-main {
  display: flex;
  align-items: flex-start;
  padding: 14px 14px 12px;
  gap: 12px;
}

.card-content { flex: 1; min-width: 0; }

.card-stop-time {
  font-size: 11.5px;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 3px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.card-location-name {
  font-family: 'Courier Prime', Courier, monospace;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 3px;
}

.card-neighborhood {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
}

.card-badges {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  align-items: center;
}

/* Base badge */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  line-height: 1.4;
  white-space: nowrap;
  vertical-align: middle;
}

/* All badges — Space Mono, uppercase, consistent */
.badge-food     { background: #fde68a; color: #78350f; }
.badge-anime    { background: #fca5a5; color: #7f1d1d; }
.badge-shopping { background: #99f6e4; color: #134e4a; }
.badge-culture  { background: #bfdbfe; color: #1e3a5f; }
.badge-nightlife{ background: #1e293b; color: #fff; }
.badge-travel   { background: #fed7aa; color: #7c2d12; }
.badge-rest     { background: #e9d5ff; color: #3b0764; }

/* Price badge — clean Space Mono, no background */
.badge-cost {
  font-family: 'Space Mono', monospace;
  background: none;
  color: #888;
  font-size: 11px;
  font-weight: 400;
  padding: 2px 4px;
  transform: none;
  border-radius: 0;
}

.badge-reservation {
  background: #fff8e6;
  color: #b08000;
  font-size: 11px;
  transform: none;
  border-radius: var(--radius-pill);
}

.card-right {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  padding-top: 2px;
}

.heart-btn {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #ccc;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  border-radius: 50%;
  transition: color 0.15s, transform 0.1s;
  flex-shrink: 0;
}

.heart-btn:hover { color: #e85d75; transform: scale(1.15); }
.heart-btn.favorited { color: #e85d75; }
.heart-btn svg { width: 16px; height: 16px; }

.map-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--faint);
  transition: all 0.15s;
}

.map-btn:hover { background: var(--bg); color: var(--text); }
.map-btn svg { width: 15px; height: 15px; }

.drag-handle {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #ccc;
  cursor: grab;
  flex-shrink: 0;
  align-self: center;
}

.drag-handle:active { cursor: grabbing; }
.drag-handle svg { width: 14px; height: 14px; }

/* Card notes (expand/collapse) */
.card-notes-toggle {
  padding: 0 14px 10px;
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--purple);
  font-weight: 500;
  cursor: pointer;
  user-select: none;
}

.card-notes-toggle:hover { color: var(--purple-dark); }
.card-notes-toggle svg { width: 12px; height: 12px; transition: transform 0.2s; }
.card-notes-toggle.open svg { transform: rotate(180deg); }

.card-notes {
  display: none;
  padding: 0 14px 12px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
  border-top: 1px solid var(--border);
  margin: 0 14px;
  padding-top: 10px;
}

.card-notes.open { display: block; }

/* =============================================
   DAY SUMMARY BAR
   ============================================= */
.day-summary {
  margin-top: 14px;
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  gap: 0;
}

.summary-item {
  flex: 1;
  text-align: center;
  border-right: 1px solid var(--border);
}

.summary-item:last-child { border-right: none; }

.summary-value {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
}

.summary-label {
  font-size: 11px;
  color: var(--muted);
  margin-top: 1px;
}

/* =============================================
   ADD ACTIVITY / ADD DAY
   ============================================= */
.add-activity-btn {
  margin-top: 12px;
  width: 100%;
  padding: 13px;
  border: 1.5px dashed var(--border);
  border-radius: var(--radius);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--purple);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.15s;
  background: transparent;
}

.add-activity-btn:hover {
  background: var(--purple-light);
  border-color: var(--purple);
}

.add-activity-btn svg { width: 16px; height: 16px; }

.add-day-section {
  padding: 12px 16px;
}

.add-day-btn {
  width: 100%;
  padding: 13px;
  border: 1.5px dashed var(--border);
  border-radius: var(--radius);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.15s;
  background: transparent;
}

.add-day-btn:hover { background: var(--bg); border-color: var(--muted); color: var(--text); }

/* =============================================
   GREEN FAB
   ============================================= */
.fab {
  position: fixed;
  bottom: 24px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--green);
  color: #1a1a1a;
  box-shadow: 0 4px 18px rgba(122,222,44,0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  transition: all 0.2s;
}

.fab:hover {
  transform: scale(1.08);
  background: var(--green-dark);
  box-shadow: 0 6px 24px rgba(122,222,44,0.55);
}

.fab:active { transform: scale(0.95); }
.fab svg { width: 24px; height: 24px; }

/* =============================================
   MODAL
   ============================================= */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 300;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--card);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  padding: 0 20px 32px;
}

.modal-overlay.open .modal { transform: translateY(0); }

.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 16px;
}

.modal-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  margin-bottom: 18px;
}

.form-group {
  margin-bottom: 14px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color 0.15s;
}

.form-input:focus { border-color: var(--purple); }

.form-textarea {
  min-height: 80px;
  resize: vertical;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.form-select {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  outline: none;
  appearance: none;
  cursor: pointer;
}

.checkbox-group {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.checkbox-label {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  cursor: pointer;
}

.checkbox-label input { cursor: pointer; accent-color: var(--purple); }

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.modal-actions .btn { flex: 1; justify-content: center; padding: 12px; font-size: 14px; }

/* Category checkbox grid */
.category-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.category-check {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}

.category-check input { display: none; }
.category-check.checked { border-color: var(--purple); background: var(--purple-light); color: var(--purple-dark); }

/* =============================================
   PRINT / PRESENTATION MODE
   ============================================= */
.presentation-mode .header-actions,
.presentation-mode .day-route-btn,
.presentation-mode .add-activity-btn,
.presentation-mode .add-day-section,
.presentation-mode .panel,
.presentation-mode .card-main .drag-handle,
.presentation-mode .fab { display: none !important; }

.presentation-mode .activity-card { cursor: default; }

@media print {
  .header-actions, .day-route-btn, .add-activity-btn,
  .add-day-section, .panel, .drag-handle, .fab,
  .day-tabs-wrapper { display: none !important; }
  .day-section { display: block !important; page-break-after: always; }
  body { background: white; }
  .activity-card { box-shadow: none; border: 1px solid #eee; }
  .trip-header { position: static; box-shadow: none; }
}

/* =============================================
   MISC UTILITY
   ============================================= */
.text-purple { color: var(--purple); }
.mt-8 { margin-top: 8px; }
.flex { display: flex; }
.gap-8 { gap: 8px; }
.items-center { align-items: center; }

.toast {
  position: fixed;
  bottom: 96px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: white;
  padding: 10px 18px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s;
  z-index: 400;
  pointer-events: none;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* =============================================
   TRIP CONFIG MODAL
   ============================================= */
.config-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 500;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.config-modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.config-modal {
  background: var(--card);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%;
  max-width: 480px;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  padding: 0 20px 36px;
}

.config-modal-overlay.open .config-modal { transform: translateY(0); }

/* Airport autocomplete */
.airport-ac-wrap { position: relative; }
.airport-ac-dropdown {

  top: 100%;

.airport-ac-option:hover, .airport-ac-option.focused { background: #f5f3f0; }
.airport-ac-code {

</style>

<script>
// =============================================
// SEED DATA — edit this to change default itinerary
// =============================================
const SEED_DATA = {
  tripName: "My Trip",
  travelers: "",
  origin: "",
  destination: "",
  startDate: "",
  endDate: "",
  days: []
};


// =============================================
// STATE
// =============================================
let itinerary = null;
let activeDayIndex = 0;
let editingDayId = null;
let editingActivityId = null;
let isNewActivity = false;
let parsedImportData = null;
let isPresentationMode = false;

// =============================================
// CATEGORIES CONFIG
// =============================================
const CATEGORIES = [
  { key: "anime",    label: "Anime",    cls: "badge-anime" },
  { key: "food",     label: "Food",     cls: "badge-food" },
  { key: "shopping", label: "Shopping", cls: "badge-shopping" },
  { key: "culture",  label: "Culture",  cls: "badge-culture" },
  { key: "nightlife",label: "Nightlife",cls: "badge-nightlife" },
  { key: "travel",   label: "Travel",   cls: "badge-travel" },
  { key: "rest",     label: "Rest",     cls: "badge-rest" }
];

// =============================================
// INIT
// =============================================
function init() {
  const saved = localStorage.getItem('itinerary-tool');
  if (saved) {
    try { itinerary = JSON.parse(saved); }
    catch(e) { itinerary = deepClone(SEED_DATA); }
  } else {
    itinerary = deepClone(SEED_DATA);
  }
  render();
}

function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

function save() {
  localStorage.setItem('itinerary-tool', JSON.stringify(itinerary));
}

// =============================================
// RENDER
// =============================================
function render() {
  renderDayTabs();
  renderDaySections();
  if (activeDayIndex >= itinerary.days.length) activeDayIndex = 0;
  setActiveDay(activeDayIndex, false);
}

function renderDayTabs() {
  const container = document.getElementById('dayTabs');
  container.innerHTML = '';
  itinerary.days.forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === activeDayIndex ? ' active' : '');
    btn.textContent = day.label + ' · ' + formatDate(day.date);
    btn.onclick = () => setActiveDay(i);
    container.appendChild(btn);
  });
}

function renderDaySections() {
  const container = document.getElementById('daySections');
  container.innerHTML = '';
  itinerary.days.forEach((day, i) => {
    container.appendChild(buildDaySection(day, i));
  });
}

function buildDaySection(day, dayIndex) {
  const section = document.createElement('div');
  section.className = 'day-section' + (dayIndex === activeDayIndex ? ' active' : '');
  section.id = 'day-' + day.id;

  // Summary counts
  const mustCount = day.activities.filter(a => a.favorited).length;
  const resCount = day.activities.filter(a => a.reservation && !a.reservationDone).length;
  const totalCost = calcDayCost(day);

  section.innerHTML = `
    <div class="day-section-header">
      <div>
        <div class="day-section-title">${escHtml(day.title)}</div>
        <div class="day-section-subtitle">${day.label} · ${formatDateLong(day.date)}</div>
      </div>
      <button class="day-route-btn" onclick="openDayRoute(${dayIndex})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
        Route
      </button>
    </div>
    <div class="activities-list" id="list-${day.id}" data-day-id="${day.id}"></div>
    <div class="day-summary">
      <div class="summary-item">
        <div class="summary-value">${totalCost > 0 ? '¥' + totalCost.toLocaleString() : '—'}</div>
        <div class="summary-label">Est. Cost</div>
      </div>
      <div class="summary-item">
        <div class="summary-value">♥ ${mustCount}</div>
        <div class="summary-label">Favorites</div>
      </div>
      <div class="summary-item">
        <div class="summary-value">${resCount > 0 ? '📅 ' + resCount : '—'}</div>
        <div class="summary-label">Reservations</div>
      </div>
    </div>
    <button class="add-activity-btn" onclick="openNewActivity('${day.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Activity
    </button>
  `;

  const list = section.querySelector('#list-' + day.id);
  day.activities.forEach((act, actIndex) => {
    list.appendChild(buildActivityCard(act, actIndex, day));
  });

  setupDragDrop(list, day.id);

  return section;
}

function buildActivityCard(act, stopIndex, day) {
  const card = document.createElement('div');
  card.className = 'activity-card';
  card.draggable = true;
  card.dataset.activityId = act.id;

  const timeStr = act.time ? formatTime(act.time) : '';
  const stopLabel = `Stop ${stopIndex + 1}${timeStr ? ' · ' + timeStr : ''}`;
  const isFav = !!act.favorited;
  const hasNotes = act.notes && act.notes.trim().length > 0;

  let badgesHtml = '';
  (act.categories || []).forEach(cat => {
    const c = CATEGORIES.find(x => x.key === cat);
    if (c) badgesHtml += `<span class="badge ${c.cls}">${c.label}</span>`;
  });
  if (act.cost) badgesHtml += `<span class="badge badge-cost">${escHtml(act.cost)}</span>`;
  if (act.reservation && !act.reservationDone) badgesHtml += `<span class="badge badge-reservation">📅 Reserve</span>`;
  if (act.reservationDone) badgesHtml += `<span class="badge badge-reservation">✓ Reserved</span>`;

  card.innerHTML = `
    <div class="card-main">
      <div class="drag-handle" title="Drag to reorder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </div>
      <div class="card-content">
        <div class="card-stop-time">${escHtml(stopLabel)}</div>
        <div class="card-location-name">${escHtml(act.name)}</div>
        ${act.neighborhood ? `<div class="card-neighborhood">${escHtml(act.neighborhood)}</div>` : ''}
        <div class="card-badges">${badgesHtml}</div>
      </div>
      <div class="card-right">
        <button class="heart-btn${isFav ? ' favorited' : ''}" onclick="toggleFavorite(event,'${day.id}','${act.id}')" title="${isFav ? 'Remove from favorites' : 'Add to favorites'}">
          ${isFav
            ? `<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
            : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
          }
        </button>
        <button class="map-btn" onclick="openMaps(event, '${encodeURIComponent(mapsAddress(act))}')" title="Open in Google Maps">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </button>
      </div>
    </div>
    ${hasNotes ? `
      <div class="card-notes-toggle" onclick="toggleNotes(event, this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        Notes
      </div>
      <div class="card-notes">${escHtml(act.notes)}</div>
    ` : ''}
  `;

  card.addEventListener('click', (e) => {
    if (e.target.closest('.map-btn') || e.target.closest('.drag-handle') || e.target.closest('.card-notes-toggle') || e.target.closest('.heart-btn')) return;
    openEditActivity(day.id, act.id);
  });

  return card;
}

// =============================================
// DAY SWITCHING
// =============================================
function setActiveDay(index, doScroll = true) {
  activeDayIndex = index;

  // Update tabs
  document.querySelectorAll('.day-tab').forEach((t, i) => {
    t.classList.toggle('active', i === index);
  });

  // Update sections
  document.querySelectorAll('.day-section').forEach((s, i) => {
    s.classList.toggle('active', i === index);
  });

  if (doScroll) {
    const activeTab = document.querySelectorAll('.day-tab')[index];
    if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// =============================================
// DRAG & DROP REORDER
// =============================================
function setupDragDrop(listEl, dayId) {
  let dragSrc = null;

  listEl.querySelectorAll('.activity-card').forEach(card => {
    card.addEventListener('dragstart', (e) => {
      dragSrc = card;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });

    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      listEl.querySelectorAll('.activity-card').forEach(c => c.classList.remove('drag-over'));
      saveReorder(listEl, dayId);
    });

    card.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      listEl.querySelectorAll('.activity-card').forEach(c => c.classList.remove('drag-over'));
      if (card !== dragSrc) card.classList.add('drag-over');
    });

    card.addEventListener('drop', (e) => {
      e.preventDefault();
      if (dragSrc && dragSrc !== card) {
        const cards = [...listEl.querySelectorAll('.activity-card')];
        const srcIdx = cards.indexOf(dragSrc);
        const dstIdx = cards.indexOf(card);
        if (srcIdx < dstIdx) {
          listEl.insertBefore(dragSrc, card.nextSibling);
        } else {
          listEl.insertBefore(dragSrc, card);
        }
      }
    });
  });
}

function saveReorder(listEl, dayId) {
  const day = itinerary.days.find(d => d.id === dayId);
  if (!day) return;
  const newOrder = [...listEl.querySelectorAll('.activity-card')].map(c => c.dataset.activityId);
  day.activities.sort((a, b) => newOrder.indexOf(a.id) - newOrder.indexOf(b.id));
  save();
  // Re-render stop numbers without full re-render
  rerenderActivityList(dayId);
}

function rerenderActivityList(dayId) {
  const day = itinerary.days.find(d => d.id === dayId);
  if (!day) return;
  const list = document.getElementById('list-' + dayId);
  if (!list) return;
  list.innerHTML = '';
  day.activities.forEach((act, i) => list.appendChild(buildActivityCard(act, i, day)));
  setupDragDrop(list, dayId);
}

// MAPS
// =============================================

// Extract the actual location name from free-form activity text
function extractLocationName(text) {
  let t = text
    .replace(/\bat\s+\d{1,2}(?::\d{2})?\s*(?:am|pm)\b/gi, ' ')    // "at 10am"
    .replace(/\baround\s+\d{1,2}(?::\d{2})?\s*(?:am|pm)\b/gi, ' ') // "around 3pm"
    .replace(/(?:¥|USD?|\$)[\d,./–-]+(?:\/\w+)?/gi, ' ')            // costs
    .replace(/\s*\([^)]*\)/g, ' ')                                    // (notes)
    .replace(/\s*[—–]\s*.+$/, '')                                     // — trailing note
    .replace(/\s+/g, ' ').trim();

  // "at [Capitalized Location]" — e.g. "go spend money at Tokyo Skytree"
  const atM = t.match(/\bat\s+([A-Z][^,\n]+?)(?:\s*[,+]|$)/);
  if (atM) return atM[1].trim();

  // "in [Capitalized Location]" — e.g. "Dinner: Ramen in Shinjuku"
  const inM = t.match(/\bin\s+([A-Z]\S+(?:\s+[A-Z]\S+)*)/);
  if (inM) return inM[1].trim();

  // "near [Capitalized Location]"
  const nearM = t.match(/\bnear\s+([A-Z]\S+(?:\s+[A-Z]\S+)*)/);
  if (nearM) return nearM[1].trim();

  // After colon — e.g. "Dinner: Ichiran Ramen"
  const colonM = t.match(/^[^:]+:\s*(.+)$/);
  if (colonM) return colonM[1].trim();

  // Strip leading action/verb words that aren't location names
  t = t.replace(/^(?:Fly|Visit|Go|Head|Check in|Grab|Explore|Morning|Evening|Night|Last|Possible|Live Music|Light Dinner?|Konbini Run?|Return|Depart|Pack|Train)\s*[:.]?\s*/i, '');

  // Strip trailing generic non-location words
  t = t.replace(/\s+(?:Evening|Morning|Night|Day|Trip|Walk|Run|Tour|Area|Browsing|Hangout|Meetup|Favorites|Farewell|Departure|Pass)$/i, '');

  return t.trim();
}

// Resolve an activity to the best Google Maps search string
function mapsAddress(act) {
  const name = act.name || '';
  const addr = act.address || '';

  // Flight route: return destination airport
  for (const s of [addr, name]) {
    const m = s.match(/\b([A-Z]{3})\s*[→>-]+\s*([A-Z]{3})\b/);
    if (m) return m[2] + ' Airport';
  }

  // Address was explicitly set (JSON / manual entry) and differs from name → trust it
  if (addr && addr.toLowerCase() !== name.toLowerCase()) return addr;

  // Extract location name from the activity text
  return extractLocationName(name) || addr || name;
}

function openMaps(e, encodedQuery) {
  e.stopPropagation();
  window.open(`https://www.google.com/maps/search/?api=1&query=${encodedQuery}`, '_blank');
}

function openDayRoute(dayIndex) {
  const idx = dayIndex !== undefined ? dayIndex : activeDayIndex;
  const day = itinerary.days[idx];
  if (!day) return;
  const stops = day.activities
    .map(a => mapsAddress(a))
    .filter(Boolean)
    .slice(0, 8);
  if (stops.length === 0) { showToast('No stops to navigate'); return; }
  const url = 'https://www.google.com/maps/dir/' + stops.map(s => encodeURIComponent(s)).join('/');
  window.open(url, '_blank');
}

function buildCategoryGrid(selectedCats) {
  const grid = document.getElementById('categoryGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const label = document.createElement('label');
    label.className = 'category-check' + (selectedCats.includes(cat.key) ? ' checked' : '');
    label.innerHTML = `<input type="checkbox" value="${cat.key}" ${selectedCats.includes(cat.key) ? 'checked' : ''}>${cat.label}`;
    label.querySelector('input').addEventListener('change', function() {
      label.classList.toggle('checked', this.checked);
    });
    grid.appendChild(label);
  });
}

function openEditActivity(dayId, actId) {
  const day = itinerary.days.find(d => d.id === dayId);
  if (!day) return;
  const act = day.activities.find(a => a.id === actId);
  if (!act) return;

  editingDayId = dayId;
  editingActivityId = actId;
  isNewActivity = false;

  document.getElementById('modalTitle').textContent = 'Edit Activity';
  document.getElementById('deleteBtn').style.display = '';
  document.getElementById('fieldName').value = act.name || '';
  document.getElementById('fieldTime').value = act.time || '';
  document.getElementById('fieldCost').value = act.cost || '';
  document.getElementById('fieldNeighborhood').value = act.neighborhood || '';
  document.getElementById('fieldAddress').value = act.address || '';
  document.getElementById('fieldPriority').value = act.priority || 'optional';
  document.getElementById('fieldReservationNeeded').checked = act.reservation || false;
  document.getElementById('fieldReservationDone').checked = act.reservationDone || false;
  document.getElementById('fieldNotes').value = act.notes || '';
  buildCategoryGrid(act.categories || []);

  openModal();
}

function openNewActivity(dayId) {
  editingDayId = dayId;
  editingActivityId = null;
  isNewActivity = true;

  document.getElementById('modalTitle').textContent = 'Add Activity';
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('fieldName').value = '';
  document.getElementById('fieldTime').value = '';
  document.getElementById('fieldCost').value = '';
  document.getElementById('fieldNeighborhood').value = '';
  document.getElementById('fieldAddress').value = '';
  document.getElementById('fieldPriority').value = 'optional';
  document.getElementById('fieldReservationNeeded').checked = false;
  document.getElementById('fieldReservationDone').checked = false;
  document.getElementById('fieldNotes').value = '';
  buildCategoryGrid([]);

  openModal();
}

function saveActivity() {
  const name = document.getElementById('fieldName').value.trim();
  if (!name) { document.getElementById('fieldName').focus(); return; }

  const cats = [...document.querySelectorAll('#categoryGrid input:checked')].map(i => i.value);

  const data = {
    name,
    time: document.getElementById('fieldTime').value,
    cost: document.getElementById('fieldCost').value.trim(),
    neighborhood: document.getElementById('fieldNeighborhood').value.trim(),
    address: document.getElementById('fieldAddress').value.trim(),
    categories: cats,
    priority: document.getElementById('fieldPriority').value,
    reservation: document.getElementById('fieldReservationNeeded').checked,
    reservationDone: document.getElementById('fieldReservationDone').checked,
    notes: document.getElementById('fieldNotes').value.trim()
  };

  const day = itinerary.days.find(d => d.id === editingDayId);
  if (!day) return;

  if (isNewActivity) {
    data.id = 'a' + Date.now();
    day.activities.push(data);
  } else {
    const idx = day.activities.findIndex(a => a.id === editingActivityId);
    if (idx >= 0) day.activities[idx] = { ...day.activities[idx], ...data };
  }

  save();
  closeModal();
  rerenderActivityList(editingDayId);
  updateDaySummary(editingDayId);
  showToast(isNewActivity ? 'Activity added' : 'Changes saved');
}

function deleteActivity() {
  if (!confirm('Delete this activity?')) return;
  const day = itinerary.days.find(d => d.id === editingDayId);
  if (!day) return;
  day.activities = day.activities.filter(a => a.id !== editingActivityId);
  save();
  closeModal();
  rerenderActivityList(editingDayId);
  updateDaySummary(editingDayId);
  showToast('Activity deleted');
}

function updateDaySummary(dayId) {
  const day = itinerary.days.find(d => d.id === dayId);
  if (!day) return;
  const section = document.getElementById('day-' + dayId);
  if (!section) return;
  const items = section.querySelectorAll('.summary-item .summary-value');
  const totalCost = calcDayCost(day);
  const mustCount = day.activities.filter(a => a.priority === 'must').length;
  const resCount = day.activities.filter(a => a.reservation && !a.reservationDone).length;
  if (items[0]) items[0].textContent = totalCost > 0 ? '¥' + totalCost.toLocaleString() : '—';
  if (items[1]) items[1].textContent = '⭐ ' + mustCount;
  if (items[2]) items[2].textContent = resCount > 0 ? '📅 ' + resCount : '—';
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('fieldName').focus(), 350);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOnBackdrop(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// =============================================
function addDay() {
  const lastDay = itinerary.days[itinerary.days.length - 1];
  const lastDate = lastDay ? new Date(lastDay.date + 'T00:00:00') : new Date();
  lastDate.setDate(lastDate.getDate() + 1);
  const dateStr = lastDate.toISOString().split('T')[0];
  const newDayNum = itinerary.days.length + 1;

  const newDay = {
    id: 'd' + Date.now(),
    label: 'Day ' + newDayNum,
    date: dateStr,
    title: 'New Day',
    activities: []
  };

  itinerary.days.push(newDay);
  save();
  render();
  setActiveDay(itinerary.days.length - 1);
  showToast('Day added');
}

// =============================================
// IMPORT
// =============================================
function parseImport() {
  const raw = document.getElementById('importText').value.trim();
  if (!raw) return;

  const parsed = parseTextItinerary(raw);

  const preview = document.getElementById('importPreview');
  const importBtn = document.getElementById('importBtn');

  if (parsed && parsed.days && parsed.days.length > 0) {
    // Drop empty days, then assign dates from startDate
    parsed.days = parsed.days.filter(d => d.activities.length > 0);
    const start = itinerary.startDate ? new Date(itinerary.startDate + 'T00:00:00') : null;
    parsed.days.forEach((d, i) => {
      if (!d.date && start) {
        const dt = new Date(start);
        dt.setDate(dt.getDate() + i);
        d.date = dt.toISOString().split('T')[0];
      }
      d.label = 'Day ' + (i + 1);
    });
    parsedImportData = parsed;
    let html = `<strong>Found ${parsed.days.length} day(s):</strong><br>`;
    parsed.days.forEach(d => {
      html += `• ${d.label}: ${d.date || ''} — ${d.activities.length} activit${d.activities.length !== 1 ? 'ies' : 'y'}<br>`;
    });
    preview.innerHTML = html;
    preview.style.display = 'block';
    importBtn.disabled = false;
  } else {
    preview.innerHTML = '<span style="color:#d44">Could not parse. Importing as notes on Day 1.</span>';
    preview.style.display = 'block';
    parsedImportData = {
      days: [{
        id: 'd' + Date.now(),
        label: 'Day (Imported)',
        date: itinerary.startDate,
        title: 'Imported Notes',
        activities: [{
          id: 'a' + Date.now(),
          name: 'Imported Content',
          time: '',
          neighborhood: '',
          address: '',
          categories: [],
          priority: 'optional',
          cost: '',
          reservation: false,
          reservationDone: false,
          notes: raw.slice(0, 500)
        }]
      }]
    };
    importBtn.disabled = false;
  }
}

function parseTextItinerary(text) {
  const lines = text.split('\n');
  const days = [];
  let currentDay = null;

  lines.forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) return;

    // Day heading patterns: "Day 1:", "## Day 2", "Day 1 · May 19"
    const dayMatch = trimmed.match(/^(?:##?\s*)?Day\s*(\d+)[:\s·]*(.*)$/i);
    if (dayMatch) {
      currentDay = {
        id: 'd' + Date.now() + days.length,
        label: 'Day ' + dayMatch[1],
        date: '',
        title: dayMatch[2].split(':').pop().trim() || 'Day ' + dayMatch[1],
        activities: []
      };
      days.push(currentDay);
      return;
    }

    // Activity: "- Name (category) [time] [cost]"
    const actMatch = trimmed.match(/^[-*•]\s*(.+)/);
    if (actMatch && currentDay) {
      const content = actMatch[1];
      const timeMatch = content.match(/(\d{1,2}:\d{2}\s*(?:AM|PM)?)/i);
      const costMatch = content.match(/(¥[\d,]+|\$[\d,.]+|USD?\s*[\d,.]+)/i);
      const name = content.replace(/\s*\(.*?\)\s*/g,'').replace(/(¥[\d,]+|\$[\d,.]+)/g,'').replace(/\d{1,2}:\d{2}\s*(?:AM|PM)?/gi,'').trim().replace(/[:—-]+$/, '').trim();
      const actName = name || content.slice(0, 60);
      // For flights, use destination airport as the address
      const flightMatch = content.match(/\b([A-Z]{3})\s*[→>-]+\s*([A-Z]{3})\b/);
      const actAddress = flightMatch ? flightMatch[2] + ' Airport' : actName;
      currentDay.activities.push({
        id: 'a' + Date.now() + Math.random(),
        name: actName,
        time: timeMatch ? timeMatch[1] : '',
        neighborhood: '',
        address: actAddress,
        categories: inferCategories(content),
        priority: content.toLowerCase().includes('must') ? 'must' : content.toLowerCase().includes('nice') ? 'nice' : 'optional',
        cost: costMatch ? costMatch[1] : '',
        reservation: content.toLowerCase().includes('reserv'),
        reservationDone: false,
        notes: ''
      });
    }
  });

  return days.length > 0 ? { days } : null;
}

function inferCategories(text) {
  const t = text.toLowerCase();
  const cats = [];
  if (t.includes('anime') || t.includes('manga') || t.includes('ghibli') || t.includes('pokémon') || t.includes('pokemon') || t.includes('gundam') || t.includes('kirby')) cats.push('anime');
  if (t.includes('food') || t.includes('eat') || t.includes('dinner') || t.includes('lunch') || t.includes('breakfast') || t.includes('café') || t.includes('cafe') || t.includes('ramen') || t.includes('sushi')) cats.push('food');
  if (t.includes('shop') || t.includes('buy') || t.includes('store') || t.includes('mall')) cats.push('shopping');
  if (t.includes('temple') || t.includes('museum') || t.includes('culture') || t.includes('art') || t.includes('walk') || t.includes('park')) cats.push('culture');
  if (t.includes('bar') || t.includes('club') || t.includes('night') || t.includes('gai')) cats.push('nightlife');
  if (t.includes('train') || t.includes('fly') || t.includes('flight') || t.includes('shinkansen') || t.includes('airport') || t.includes('depart')) cats.push('travel');
  if (t.includes('hotel') || t.includes('check in') || t.includes('rest') || t.includes('sleep') || t.includes('pack')) cats.push('rest');
  return cats.length > 0 ? cats : ['culture'];
}

let autoParseTimer = null;
function scheduleAutoParse() {
  clearTimeout(autoParseTimer);
  autoParseTimer = setTimeout(parseImport, 400);
}

function doImport() {
  if (!parsedImportData) parseImport();
  if (!parsedImportData) return;
  if (!confirm(`Import ${parsedImportData.days.length} day(s)? This will replace your current itinerary.`)) return;
  itinerary.days = parsedImportData.days;
  save();
  render();
  document.getElementById('importText').value = '';
  document.getElementById('importPreview').style.display = 'none';
  document.getElementById('importBtn').disabled = true;
  parsedImportData = null;
  showToast('Imported successfully');
}

function loadTesseract() {
  return new Promise((resolve, reject) => {
    if (window.Tesseract) { resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function loadImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  const status = document.getElementById('fileStatus');
  const btn    = event.target.closest('label');

  if (file.type.startsWith('image/')) {
    status.textContent = 'Reading photo...';
    if (btn) { btn.style.opacity = '0.5'; btn.style.pointerEvents = 'none'; }
    try {
      await loadTesseract();
      const { data: { text } } = await Tesseract.recognize(file, 'eng');
      document.getElementById('importText').value = text.replace(/\f/g, '\n').trim();
      status.textContent = 'Photo read — review the text above, then click Parse';
    } catch (err) {
      status.textContent = 'Could not read photo. Try copying the text and pasting it instead.';
    } finally {
      if (btn) { btn.style.opacity = ''; btn.style.pointerEvents = ''; }
    }
  } else if (file.name.endsWith('.json')) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const obj = JSON.parse(e.target.result);
        if (obj.days && Array.isArray(obj.days)) {
          // Assign dates and re-number like the text parser does
          const start = itinerary.startDate ? new Date(itinerary.startDate + 'T00:00:00') : null;
          const days = obj.days.filter(d => d.activities && d.activities.length > 0);
          days.forEach((d, i) => {
            if (!d.date && start) {
              const dt = new Date(start); dt.setDate(dt.getDate() + i);
              d.date = dt.toISOString().split('T')[0];
            }
            d.label = 'Day ' + (i + 1);
          });
          parsedImportData = { days };
          let html = `<strong>Found ${days.length} day(s):</strong><br>`;
          days.forEach(d => { html += `• ${d.label}: ${d.date || ''} — ${d.activities.length} activit${d.activities.length !== 1 ? 'ies' : 'y'}<br>`; });
          const preview = document.getElementById('importPreview');
          preview.innerHTML = html; preview.style.display = 'block';
          document.getElementById('importBtn').disabled = false;
          status.textContent = file.name + ' loaded';
        } else {
          status.textContent = 'JSON loaded but no days found — check the format';
        }
      } catch(e) {
        status.textContent = 'Could not read JSON file';
      }
    };
    reader.readAsText(file);
  } else {
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('importText').value = e.target.result;
      status.textContent = file.name + ' loaded';
      parseImport();
    };
    reader.readAsText(file);
  }
}

function copyAsText() {
  let txt = itinerary.tripName + '\n';
  txt += itinerary.travelers + ' · ' + formatDateLong(itinerary.startDate) + ' – ' + formatDateLong(itinerary.endDate) + '\n\n';
  itinerary.days.forEach(day => {
    txt += day.label + ' · ' + formatDateLong(day.date);
    if (day.title) txt += ' — ' + day.title;
    txt += '\n';
    day.activities.forEach(act => {
      const time = act.time ? formatTime(act.time) + '  ' : '';
      const star = act.priority === 'must' ? ' ★' : '';
      txt += '  - ' + time + act.name + star;
      if (act.neighborhood) txt += ' (' + act.neighborhood + ')';
      if (act.reservation && !act.reservationDone) txt += ' [reserve]';
      txt += '\n';
    });
    txt += '\n';
  });
  navigator.clipboard.writeText(txt)
    .then(() => showToast('Copied to clipboard!'))
    .catch(() => showToast('Copy failed — try Print instead'));
}

function itineraryText() {
  const name = itinerary.tripName || 'My Trip';
  const travelers = itinerary.travelers || '';
  const dateRange = formatDateLong(itinerary.startDate) + ' – ' + formatDateLong(itinerary.endDate);

  let txt = name.toUpperCase() + '\n';
  if (travelers) txt += travelers + '\n';
  txt += dateRange + '\n';
  txt += '—'.repeat(32) + '\n\n';

  itinerary.days.forEach(day => {
    const dayDate = day.date ? formatDateLong(day.date) : '';
    txt += (day.label || '').toUpperCase();
    if (day.title) txt += ' · ' + day.title;
    if (dayDate) txt += '\n' + dayDate;
    txt += '\n';
    day.activities.forEach(act => {
      const time = act.time ? formatTime(act.time) + '  ' : '';
      const must = act.priority === 'must' ? ' ★' : '';
      const reserve = (act.reservation && !act.reservationDone) ? ' [book ahead]' : '';
      const cost = act.cost ? '  ' + act.cost : '';
      txt += '  • ' + time + act.name + must + cost + reserve + '\n';
    });
    txt += '\n';
  });
  return txt.trimEnd();
}

function shareFilename() {
  return (itinerary.tripName || 'itinerary').toLowerCase().replace(/\s+/g, '-') + '.txt';
}

function handleShare(e) {
  e.stopPropagation();
  // On mobile (or any browser with native share), go straight to native share sheet
  if (navigator.share) {
    shareAsFile();
  } else {
    // Desktop fallback: toggle the dropdown menu
    document.getElementById('shareMenu').classList.toggle('open');
  }
}

function closeShareMenu() {
  document.getElementById('shareMenu').classList.remove('open');
}

async function shareAsText() {
  closeShareMenu();
  const text = itineraryText();
  if (navigator.share) {
    try { await navigator.share({ title: itinerary.tripName || 'Itinerary', text }); return; } catch(e) { if (e.name === 'AbortError') return; }
  }
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!')).catch(() => showToast('Copy failed'));
}

async function shareAsFile() {
  closeShareMenu();
  const text = itineraryText();
  const filename = shareFilename();
  const file = new File([text], filename, { type: 'text/plain' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file], title: itinerary.tripName || 'Itinerary' }); return; } catch(e) { if (e.name === 'AbortError') return; }
  }
  // Fallback: try text share, then download
  if (navigator.share) {
    try { await navigator.share({ title: itinerary.tripName || 'Itinerary', text }); return; } catch(e) { if (e.name === 'AbortError') return; }
  }
  downloadFile(filename, text, 'text/plain');
  showToast('Saved as ' + filename);
}

function shareViaEmail() {
  closeShareMenu();
  const text = itineraryText();
  const subject = encodeURIComponent(itinerary.tripName || 'Itinerary');
  const body = encodeURIComponent(text);
  window.location.href = `mailto:?subject=${subject}&body=${body}`;
}

function saveAsFile() {
  closeShareMenu();
  const text = itineraryText();
  const filename = shareFilename();
  downloadFile(filename, text, 'text/plain');
  showToast('Saved as ' + filename);
}

// Close share menu when clicking outside

function downloadFile(filename, content, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatDateLong(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
}

function formatTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hh = h % 12 || 12;
  return `${hh}:${String(m).padStart(2,'0')} ${ampm}`;
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function calcDayCost(day) {
  let total = 0;
  day.activities.forEach(a => {
    if (!a.cost) return;
    const match = a.cost.replace(/,/g,'').match(/[\d]+/);
    if (match) total += parseInt(match[0]);
  });
  return total;
}

    const dd = String(d.getDate()).padStart(2, '0');

// =============================================
// SCROLL SPREAD ANIMATION
// =============================================
(function () {
  const SCROLL_MAX  = 80;   // px scroll to reach full effect
  const SPREAD_PX   = 120;  // max translateX each side
  const SCALE_END   = 0.72; // shrink to 72% at full scroll
  const OPACITY_MIN = 0.18; // very faint at full scroll

  const fromEl = document.getElementById('headerFrom');
  // Capture initial left offset before any scroll so we can clamp the
  // leftward spread to keep 'from' on-screen
  const fromInitLeft = fromEl ? fromEl.getBoundingClientRect().left : 20;

  function onScroll() {
    const from = document.getElementById('headerFrom');
    const to   = document.getElementById('headerTo');
    const swap    = document.querySelector('.airport-hero-swap');
    const cityRow = document.querySelector('.airport-city-row');
    if (!from || !to) return;

    const progress   = Math.min(window.scrollY, SCROLL_MAX) / SCROLL_MAX;
    const rawSpread  = progress * SPREAD_PX;
    // Clamp leftward spread so 'from' never leaves the viewport
    const fromSpread = Math.min(rawSpread, Math.max(0, fromInitLeft - 4));
    const scale      = 1 - progress * (1 - SCALE_END);
    const opacity    = 1 - progress * (1 - OPACITY_MIN);

    from.style.transform       = `translateX(-${fromSpread}px) scale(${scale})`;
    from.style.transformOrigin = 'left center';
    from.style.opacity         = opacity;

    to.style.transform       = `translateX(${rawSpread}px) scale(${scale})`;
    to.style.transformOrigin = 'right center';
    to.style.opacity         = opacity;

    if (swap)    swap.style.opacity    = (1 - progress).toString();
    if (cityRow) cityRow.style.opacity = (1 - progress * 1.5).toString();
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
}());

const SAVED_TRIPS_KEY = 'itinerary-saved-trips';

function getSavedTrips() {
  try { return JSON.parse(localStorage.getItem(SAVED_TRIPS_KEY)) || []; }
  catch(e) { return []; }
}

function saveCurrentTrip() {
  const name = itinerary.tripName || (tripConfig.toCity ? `Trip to ${tripConfig.toCity}` : 'My Trip');
  const trips = getSavedTrips();
  const trip = {
    id: 'trip_' + Date.now(),
    name,
    savedAt: new Date().toISOString(),
    tripConfig: { ...tripConfig },
    itinerary: deepClone(itinerary),
  };
  trips.unshift(trip);
  localStorage.setItem(SAVED_TRIPS_KEY, JSON.stringify(trips));
  renderSavedTrips();
  showToast(`"${name}" saved`);
}

function loadSavedTrip(id) {
  const trips = getSavedTrips();
  const trip = trips.find(t => t.id === id);
  if (!trip) return;
  itinerary = deepClone(trip.itinerary);
  tripConfig = { ...trip.tripConfig };
  save();
  saveTripConfigToStorage();
  applyTripConfig();
  render();
  showToast(`Loaded "${trip.name}"`);
}

function deleteSavedTrip(id) {
  const trips = getSavedTrips().filter(t => t.id !== id);
  localStorage.setItem(SAVED_TRIPS_KEY, JSON.stringify(trips));
  renderSavedTrips();
}

function renderSavedTrips() {
  const container = document.getElementById('tripsList');
  if (!container) return;
  const trips = getSavedTrips();
  if (!trips.length) {
    container.innerHTML = '<div class="saved-trips-empty">No saved trips yet</div>';
    return;
  }
  container.innerHTML = trips.map(t => {
    const route = (t.tripConfig.fromCode && t.tripConfig.toCode)
      ? `${t.tripConfig.fromCode} → ${t.tripConfig.toCode}`
      : t.tripConfig.toCity || '';
    const date = new Date(t.savedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    return `
      <div class="saved-trip-item">
        <div class="saved-trip-info" onclick="loadSavedTrip('${t.id}')">
          <div class="saved-trip-name">${t.name}</div>
          ${route ? `<div class="saved-trip-route">${route}</div>` : ''}
          <div class="saved-trip-date">${date}</div>
        </div>
        <button class="saved-trip-del" onclick="deleteSavedTrip('${t.id}')" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>`;
  }).join('');
}

  PVG:[31.1443,121.8083],MEX:[19.4363,-99.0721],GRU:[-23.4356,-46.4731],
  YYZ:[43.6777,-79.6248],YVR:[49.1967,-123.1815],MEL:[-37.6733,144.843],
  JNB:[-26.1367,28.2411],MNL:[14.5086,121.019],KUL:[2.7456,101.7099],
};

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371, toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function nearestAirport(lat, lon) {
  let best = null, bestDist = Infinity;
  for (const [code, [alat, alon]] of Object.entries(AIRPORT_COORDS)) {
    const d = haversineKm(lat, lon, alat, alon);
    if (d < bestDist) { bestDist = d; best = code; }
  }
  return best ? AIRPORTS.find(a => a.c === best) : null;
}

// Pick a trip on first open: detect nearest airport for "from", random international for "to"
(function maybeRandomizeTrip() {
  if (localStorage.getItem('itinerary-trip-config')) return;
  const international = AIRPORTS.filter(a => a.country !== 'US');
  const domestic = AIRPORTS.filter(a => a.country === 'US');
  const to = international[Math.floor(Math.random() * international.length)];

  function setTrip(from) {
    tripConfig = { fromCode: from.c, fromCity: from.city, toCode: to.c, toCity: to.city, depDate: tripConfig.depDate, retDate: tripConfig.retDate };
    applyTripConfig();
  }

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => { const near = nearestAirport(pos.coords.latitude, pos.coords.longitude); setTrip(near || domestic[Math.floor(Math.random() * domestic.length)]); },
      ()  => { setTrip(domestic[Math.floor(Math.random() * domestic.length)]); },
      { timeout: 5000 }
    );
  } else {
    setTrip(domestic[Math.floor(Math.random() * domestic.length)]);
  }
}());

let acFocusIndex = { from: -1, to: -1 };
let acResults = { from: [], to: [] };

function acInput(side, raw) {
  const q = raw.toUpperCase().trim();
  if (q.length < 1) { acClose(side); return; }
  const matches = AIRPORTS.filter(a =>
    a.c.startsWith(q) ||
    a.city.toUpperCase().includes(q) ||
    a.name.toUpperCase().includes(q) ||
    a.country.toUpperCase() === q
  ).slice(0, 10);
  acResults[side] = matches;
  acFocusIndex[side] = -1;
  const drop = document.getElementById(side === 'from' ? 'acDropFrom' : 'acDropTo');
  if (!matches.length) { acClose(side); return; }
  drop.innerHTML = matches.map((a, i) =>
    `<div class="airport-ac-option" data-i="${i}" onmousedown="acSelect('${side}',${i})">
      <span class="airport-ac-code">${a.c}</span>
      <span class="airport-ac-info"><span class="airport-ac-city">${a.city}</span>, ${a.country} · <span style="font-size:11px">${a.name}</span></span>
    </div>`
  ).join('');
  drop.classList.add('open');
}

function acSelect(side, i) {
  const a = acResults[side][i];
  if (!a) return;
  const codeEl = document.getElementById(side === 'from' ? 'cfgFromCode' : 'cfgToCode');
  const cityEl = document.getElementById(side === 'from' ? 'cfgFromCity' : 'cfgToCity');
  codeEl.value = a.c;
  cityEl.value = a.city;
  acClose(side);
}

function acClose(side) {
  const drop = document.getElementById(side === 'from' ? 'acDropFrom' : 'acDropTo');
  drop.classList.remove('open');
  drop.innerHTML = '';
  acFocusIndex[side] = -1;
}

function acBlur(side) {
  setTimeout(() => acClose(side), 150);
}

function acKey(e, side) {
  const drop = document.getElementById(side === 'from' ? 'acDropFrom' : 'acDropTo');
  const opts = drop.querySelectorAll('.airport-ac-option');
  if (!opts.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acFocusIndex[side] = Math.min(acFocusIndex[side] + 1, opts.length - 1);
    opts.forEach((o, i) => o.classList.toggle('focused', i === acFocusIndex[side]));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acFocusIndex[side] = Math.max(acFocusIndex[side] - 1, 0);
    opts.forEach((o, i) => o.classList.toggle('focused', i === acFocusIndex[side]));
  } else if (e.key === 'Enter' && acFocusIndex[side] >= 0) {
    e.preventDefault();
    acSelect(side, acFocusIndex[side]);
  } else if (e.key === 'Escape') {
    acClose(side);
  }
}
